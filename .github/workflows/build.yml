name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Test
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build & Test
        run: |
          xcodebuild test \
            -project Pomodoro/Pomodoro.xcodeproj \
            -scheme Pomodoro \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 17' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
